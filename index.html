<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFD700">
    <title>20Y PULSE v10.1</title>
    <link rel="manifest" href="manifest.json">
    <link id="font-link" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style id="dynamic-theme"></style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding: 20px; min-height: 100vh; transition: all 0.3s ease; }
        .header { text-align: center; font-size: 28px; margin: 20px 0; font-weight: bold; transition: all 0.3s ease; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .tabs-2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .tab { padding: 12px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .tab.active { font-weight: bold; }
        .content { padding: 20px; border-radius: 8px; transition: all 0.3s ease; }
        .title { font-size: 20px; margin-bottom: 20px; font-weight: bold; }
        input, select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; border-radius: 8px; transition: all 0.3s ease; }
        button { cursor: pointer; font-weight: bold; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .footer { text-align: center; margin-top: 30px; font-size: 14px; opacity: 0.8; }
        .hidden { display: none; }
        .objetivo { padding: 15px; margin: 15px 0; border-radius: 8px; }
        .obj-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .progress { width: 100%; height: 8px; margin: 10px 0; border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.3s ease; }
        .animo-btn { font-size: 30px; padding: 8px; }
        .coach-msg { padding: 15px; margin: 15px 0; border-radius: 0 8px 8px 0; }
        .spith-box { padding: 15px; margin: 15px 0; font-style: italic; font-size: 18px; line-height: 1.5; border-radius: 0 8px 8px 0; }
        .plan-box { padding: 15px; margin: 15px 0; border-radius: 8px; }
        .orden-box { padding: 15px; margin: 15px 0; border-radius: 8px; }
        .consejo-item { padding: 15px; margin: 15px 0; border-radius: 8px; }
        .consejo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .stat-line { display: flex; justify-content: space-between; margin: 5px 0; padding: 8px 0; }
        .hr { margin: 20px 0; }
        .paywall { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 9999; 
            display: none;
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            background: #000;
        }
        .paywall.show { display: flex; }
        .paywall-box { padding: 30px; text-align: center; max-width: 400px; border-radius: 16px; }
        .theme-card { border: 2px solid; padding: 20px; margin: 15px 0; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; }
        .theme-card:hover { transform: translateY(-4px); }
        .theme-card.active { box-shadow: 0 0 30px; }
        .theme-preview { width: 100%; height: 80px; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="paywall" class="paywall">
        <div class="paywall-box">
            <div style="font-size:24px;font-weight:bold;margin-bottom:20px;">⚡ TRIAL 20Y TERMINADO</div>
            <div style="margin-bottom:20px;">Tus 7 días gratis expiraron.<br><br>Desbloquea 20Y PULSE PRO:</div>
            <div style="text-align:left;margin:20px 0;">
                ✅ Objetivos ilimitados<br>
                ✅ Plan Estratégico 72h<br>
                ✅ Coach IA ilimitado<br>
                ✅ Temas Premium<br>
                ✅ Exportar PDF
            </div>
            <div style="font-size:28px;margin:20px 0;">$9.99/mes</div>
            <button class="primary" onclick="alert('Stripe: Conecta tu cuenta en Render Dashboard > Environment > STRIPE_KEY')">DESBLOQUEAR PRO</button>
            <div style="font-size:12px;margin-top:20px;opacity:0.7;">20Y CORE SYSTEMS</div>
        </div>
    </div>

    <div class="header">20Y PULSE <span id="trial-badge" style="font-size:14px;"></span></div>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('usuario')">USUARIO</div>
        <div class="tab" onclick="showTab('objetivos')">OBJETIVOS</div>
        <div class="tab" onclick="showTab('spith')">SPITH</div>
    </div>
    <div class="tabs-2">
        <div class="tab" onclick="showTab('ejecucion')">EJECUCIÓN</div>
        <div class="tab" onclick="showTab('coach')">COACH</div>
        <div class="tab" onclick="showTab('tema')">TEMA</div>
    </div>

    <div id="usuario" class="content">
        <div class="title">EDITAR USUARIO</div>
        <input type="text" id="nombre" placeholder="Nombre" value="Samuel Suazo">
        <input type="text" id="tag" placeholder="Tag" value="FundadorActivo titan 8v.5live">
        <select id="perfil">
            <option value="">-- ELIGE TU PERFIL 20Y --</option>
            <option value="CEO">CEO - Ejecutor Máximo</option>
            <option value="Financista">Financista - Capital Killer</option>
            <option value="Broker">Broker - Deal Maker</option>
            <option value="Trader">Trader - Pulse Sniper</option>
            <option value="Builder">Builder - Arquitecto 20Y</option>
            <option value="Operator">Operator - Máquina de Ejecución</option>
            <option value="Investor">Investor - Cazador de Alpha</option>
            <option value="Leyenda">Leyenda - Modo Dios</option>
        </select>
        <div class="row">
            <input type="number" id="edad" placeholder="Edad" value="50">
            <input type="text" id="ratio" placeholder="Ratio" value="4/4">
        </div>
        <input type="text" id="power" placeholder="Power %" value="98%">
        <button class="primary" onclick="guardarUsuario()">GUARDAR</button>
        <button class="share" onclick="compartirPerfil()">📤 INVITAR A MI EQUIPO 20Y</button>
    </div>

    <div id="objetivos" class="content hidden">
        <div class="title">OBJETIVOS Y METAS 20Y</div>
